<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1 id="myHeading">Hello World
        
    </h1>
    <p id="paragraph">This is a simple paragraph.
        
    </p>
    <button id="myButton">Click Me</button>
    
</body>
<script>
    const myHeading = document.getElementById("myHeading");
    console.log(myHeading);
    console.log(myHeading.innerText);
    myHeading.innerText = "Hello JavaScript!";
    console.log(myHeading.innerText);
    myHeading.style.color = "black";
    console.log(myHeading.style.color);
    const myButton = document.getElementById("myButton");
    let count = 0;
    const paragraph = document.getElementById("paragraph"); 
     myButton.addEventListener("click", function() {
        count++;
        myHeading.style.color = "white";
        myButton.innerText = "please wait...";
        document.body.style.backgroundColor = "black";
        paragraph.style.color = "white";
        paragraph.innerText= count;
    });
</script>
</html>git
